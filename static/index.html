<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="calculator-card">
      <div class="calculator-display">
        <input id="display" type="text" autocomplete="off" spellcheck="false" readonly />
      </div>
      <div class="calculator-grid" id="buttons">
        <button class="btn secondary" data-value="C">C</button>
        <button class="btn secondary" data-value="(">(</button>
        <button class="btn secondary" data-value=")">)</button>
        <button class="btn operator" data-value="/">÷</button>

        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn operator" data-value="*">×</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn operator" data-value="-">−</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn operator" data-value="+">+</button>

        <button class="btn wide" data-value="0">0</button>
        <button class="btn" data-value=".">.</button>
        <button class="btn equals" data-value="=">=</button>
      </div>
      <p class="note">Powered by FastAPI</p>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
