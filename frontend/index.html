<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pump Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    /* ── Header / Controls ───────────────────────────────────── */
    header {
      background: #1a237e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header label {
      font-size: 0.8rem;
      opacity: 0.85;
    }

    header select,
    header input[type="number"] {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      background: #fff;
      color: #222;
    }

    header input[type="number"] { width: 75px; }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .ctrl-hint {
      font-size: 0.68rem;
      opacity: 0.65;
      line-height: 1;
    }

    .btn-download { background: #0277bd; color: #fff; }

    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-start { background: #43a047; color: #fff; }
    .btn-stop  { background: #e53935; color: #fff; }
    .btn-rca   { background: #1a237e; color: #fff; }

    /* ── Status bar ──────────────────────────────────────────── */
    #status-bar {
      padding: 6px 20px;
      font-size: 0.78rem;
      color: #555;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
    }

    /* ── Charts grid ─────────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 14px;
    }

    .chart-card {
      background: #fff;
      border-radius: 8px;
      padding: 14px 16px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.green  { background: #2ecc71; }
    .status-dot.yellow { background: #f1c40f; }
    .status-dot.red    { background: #e74c3c; }

    .tag-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #333;
    }

    .tag-value {
      margin-left: auto;
      font-size: 0.8rem;
      font-family: monospace;
      color: #666;
    }

    .chart-wrapper {
      position: relative;
      height: 150px;
    }

    /* ── RCA Panel ───────────────────────────────────────────── */
    #rca-panel {
      margin: 0 14px 20px;
      background: #fff;
      border-radius: 8px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    #rca-panel h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a237e;
      letter-spacing: 0.3px;
    }

    .rca-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #ddd;
      border-top-color: #1a237e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #rca-result {
      margin-top: 14px;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #333;
      background: #f8f9fb;
      border: 1px solid #e4e7ed;
      border-radius: 5px;
      padding: 16px 20px;
      min-height: 64px;
    }

    #rca-result p { margin: 0 0 10px; }
    #rca-result p:last-child { margin-bottom: 0; }

    #rca-result h1, #rca-result h2, #rca-result h3 {
      font-size: 0.92rem;
      font-weight: 700;
      color: #1a237e;
      margin: 14px 0 6px;
    }
    #rca-result h1:first-child,
    #rca-result h2:first-child,
    #rca-result h3:first-child { margin-top: 0; }

    #rca-result ul, #rca-result ol {
      margin: 0 0 10px 18px;
      padding: 0;
    }
    #rca-result li { margin-bottom: 4px; }

    #rca-result strong { color: #111; font-weight: 700; }
    #rca-result em { color: #555; }

    #rca-result code {
      background: #eef0f4;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.82rem;
      font-family: monospace;
    }

    #rca-result hr {
      border: none;
      border-top: 1px solid #e4e7ed;
      margin: 12px 0;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>Pump Monitor</h1>
  <span id="conn-dot" style="width:10px;height:10px;border-radius:50%;background:#e53935;display:inline-block;margin-right:4px;flex-shrink:0;transition:background 0.4s;" title="Backend connection status"></span>
  <span id="conn-label" style="font-size:0.78rem;opacity:0.85;margin-right:auto;">Connecting…</span>

  <div class="ctrl-group">
    <label for="durationHrs">Duration (hrs)</label>
    <input type="number" id="durationHrs" value="8" min="0.1" max="93.3" step="0.1"
           oninput="if(+this.value>93.3)this.value=93.3" />
    <span class="ctrl-hint">max 93.3 hrs</span>
  </div>

  <label for="faultType">Fault Type</label>
  <select id="faultType">
    <option value="none">None (Normal)</option>
    <option value="cavitation">Cavitation</option>
    <option value="bearing_wear">Bearing Wear</option>
    <option value="seal_leak">Seal Leak</option>
    <option value="plugged_discharge">Plugged Discharge</option>
  </select>

  <div class="ctrl-group">
    <label for="faultStart">Fault Start (hrs)</label>
    <input type="number" id="faultStart" value="4" min="0" max="93.3" step="0.1"
           oninput="if(+this.value>93.3)this.value=93.3" />
    <span class="ctrl-hint">max 93.3 hrs</span>
  </div>

  <button class="btn btn-start" id="startBtn">Start</button>
  <button class="btn btn-stop"  id="stopBtn">Stop</button>
  <button class="btn btn-download" id="downloadBtn">Download CSV</button>
</header>

<div id="status-bar">No simulation running. Press Start to begin.</div>

<div class="charts-grid" id="chartsGrid"></div>

<div id="rca-panel">
  <h2>Agent Analysis</h2>
  <div class="rca-controls">
    <button class="btn btn-rca" id="rcaBtn">Run RCA</button>
    <div class="spinner hidden" id="spinner"></div>
  </div>
  <div id="rca-result">Click "Run RCA" to get Claude's root cause analysis.</div>
</div>

<script>
  //const API = 'http://localhost:8000';
  const API_URL =  "https://equipment-monitor-production.up.railway.app";
  //const API_URL = window.API_URL || "http://localhost:8000";

  const TAGS = [
    'PUMP_FLOW',
    'PUMP_INLET_PRESS',
    'PUMP_OUTLET_PRESS',
    'PUMP_VIBRATION',
    'PUMP_MOTOR_CURRENT',
    'PUMP_BEARING_TEMP',
  ];

  const COLORS = {
    PUMP_FLOW:          '#4e79a7',
    PUMP_INLET_PRESS:   '#f28e2b',
    PUMP_OUTLET_PRESS:  '#e15759',
    PUMP_VIBRATION:     '#76b7b2',
    PUMP_MOTOR_CURRENT: '#59a14f',
    PUMP_BEARING_TEMP:  '#edc948',
  };

  const charts = {};

  // ── Build chart cards ───────────────────────────────────────
  const grid = document.getElementById('chartsGrid');

  TAGS.forEach(tag => {
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="chart-header">
        <span class="status-dot" id="dot-${tag}"></span>
        <span class="tag-label">${tag.replace(/_/g, ' ')}</span>
        <span class="tag-value" id="val-${tag}">—</span>
      </div>
      <div class="chart-wrapper">
        <canvas id="canvas-${tag}"></canvas>
      </div>
    `;
    grid.appendChild(card);

    const ctx = document.getElementById(`canvas-${tag}`).getContext('2d');
    charts[tag] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: tag,
          data: [],
          borderColor: COLORS[tag],
          backgroundColor: COLORS[tag] + '22',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.2,
          fill: true,
        }],
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { maxTicksLimit: 8, font: { size: 10 } },
            title: { display: true, text: 'Time (min)', font: { size: 10 } },
          },
          y: {
            ticks: { font: { size: 10 } },
          },
        },
      },
    });
  });

  // ── Polling ─────────────────────────────────────────────────
  let pollTimer = null;

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    poll();
    pollTimer = setInterval(poll, 2000);
  }

  async function poll() {
    await Promise.all([fetchHistory(), fetchTags()]);
  }

  async function fetchHistory() {
    try {
      const res = await fetch(`${API}/history`);
      if (!res.ok) return;
      const data = await res.json();
      if (!data.history || !data.history.time || data.history.time.length === 0) return;

      const times = data.history.time.map(t => Math.round(t));
      TAGS.forEach(tag => {
        if (!data.history[tag]) return;
        charts[tag].data.labels = times;
        charts[tag].data.datasets[0].data = data.history[tag];
        charts[tag].update('none');
      });

      const count = times.length;
      const total = data.total || count;
      const pct = total ? Math.round(count / total * 100) : 100;
      document.getElementById('status-bar').textContent = data.is_running
        ? `Simulation running — ${count} / ${total} samples (${pct}%)`
        : `Simulation complete — ${count} samples`;
    } catch {
      // backend not reachable yet
    }
  }

  async function fetchTags() {
    try {
      const res = await fetch(`${API}/tags`);
      if (!res.ok) throw new Error('non-200');
      const data = await res.json();
      document.getElementById('conn-dot').style.background = '#43a047';
      document.getElementById('conn-label').textContent = 'Backend online';
      if (!data.tags) return;

      TAGS.forEach(tag => {
        const tagData = data.tags[tag];
        if (!tagData) return;
        document.getElementById(`dot-${tag}`).className = `status-dot ${tagData.status}`;
        document.getElementById(`val-${tag}`).textContent = tagData.value.toFixed(3);
      });
    } catch {
      document.getElementById('conn-dot').style.background = '#e53935';
      document.getElementById('conn-label').textContent = 'Backend offline';
    }
  }

  // ── Start ───────────────────────────────────────────────────
  document.getElementById('startBtn').addEventListener('click', async () => {
    const fault_type     = document.getElementById('faultType').value;
    const faultStartHrs  = parseFloat(document.getElementById('faultStart').value) || 0;
    const fault_start    = Math.round(faultStartHrs * 60);
    const durationHrs    = parseFloat(document.getElementById('durationHrs').value) || 8;
    const duration       = Math.min(Math.round(durationHrs * 60), 5600);

    // Reset charts
    TAGS.forEach(tag => {
      charts[tag].data.labels = [];
      charts[tag].data.datasets[0].data = [];
      charts[tag].update('none');
      document.getElementById(`dot-${tag}`).className = 'status-dot';
      document.getElementById(`val-${tag}`).textContent = '—';
    });
    document.getElementById('rca-result').textContent = 'Click "Run RCA" to get Claude\'s root cause analysis.';

    try {
      await fetch(`${API}/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fault_type, fault_start, duration }),
      });
      document.getElementById('status-bar').textContent = 'Starting simulation...';
      startPolling();
    } catch {
      alert('Could not reach the backend. Is it running on port 8000?');
    }
  });

  // ── Stop ────────────────────────────────────────────────────
  document.getElementById('stopBtn').addEventListener('click', async () => {
    // Stop polling first so it can't overwrite the status message
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    try {
      await fetch(`${API}/stop`, { method: 'POST' });
    } catch { /* ignore */ }

    document.getElementById('status-bar').textContent = 'Simulation stopped.';

    // Reset status dots to neutral
    TAGS.forEach(tag => {
      document.getElementById(`dot-${tag}`).className = 'status-dot';
    });
  });

  // ── Run RCA ─────────────────────────────────────────────────
  document.getElementById('rcaBtn').addEventListener('click', async () => {
    const btn     = document.getElementById('rcaBtn');
    const spinner = document.getElementById('spinner');
    const result  = document.getElementById('rca-result');

    btn.disabled = true;
    spinner.classList.remove('hidden');
    result.textContent = 'Sending data to Claude...';

    try {
      const res  = await fetch(`${API}/analyze`, { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        result.innerHTML = marked.parse(data.diagnosis);
      } else {
        result.textContent = `Error: ${data.detail}`;
      }
    } catch {
      result.textContent = 'Failed to reach backend.';
    } finally {
      btn.disabled = false;
      spinner.classList.add('hidden');
    }
  });

  // ── Download CSV ─────────────────────────────────────────────
  document.getElementById('downloadBtn').addEventListener('click', async () => {
    let data;
    try {
      const res = await fetch(`${API}/history`);
      data = await res.json();
    } catch {
      alert('Could not reach the backend.');
      return;
    }

    if (!data.history || !data.history.time || data.history.time.length === 0) {
      alert('No simulation data to download. Run a simulation first.');
      return;
    }

    const cols = ['time', ...TAGS];
    const header = cols.join(',');
    const rows = data.history.time.map((t, i) =>
      cols.map(c => c === 'time' ? t : (data.history[c] != null ? data.history[c][i] : '')).join(',')
    );
    const csv = [header, ...rows].join('\n');

    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'pump_simulation.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // Start polling on load to pick up any existing state
  startPolling();
</script>
</body>
</html>
